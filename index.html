<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobilité Lyon</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; margin:0; }

header {
  padding:10px;
  background:#0078A8;
  color:white;
}

#container {
  display:flex;
  flex-direction:column;
  height:100vh;
}

#list {
  overflow:auto;
  height:40vh;
}

#detail {
  padding:10px;
  background:#f9f9f9;
}

#map {
  flex:1;
}

.item {
  padding:10px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.item:hover {
  background:#f0f0f0;
}

.borne {
  background:#eee;
  margin:5px 0;
  padding:6px;
  cursor:pointer;
}

button {
  padding:8px;
  margin-top:10px;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="container">

<header>
  🚗 Parkings + ⚡ Bornes
</header>

<div id="list"></div>
<div id="detail">👉 Sélectionne un parking</div>
<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API = "https://me-rendre-a-lyon.jean-luc-perrotto.workers.dev";

let data = {};
let selected = null;
let map;
let markers = [];

function safe(v){ return v ?? '—'; }

// ── LOAD ──
async function load(){
  try{
    const r = await fetch(API);
    data = await r.json();

    initMap();
    renderList();
    renderMap();

  }catch(e){
    document.getElementById("list").innerHTML="Erreur API";
    console.error(e);
  }
}

// ── MAP INIT ──
function initMap(){
  map = L.map('map').setView([45.75,4.85],12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);
}

// ── LIST ──
function renderList(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.parkings.tcl.forEach(p=>{

    const el = document.createElement("div");
    el.className="item";

    el.innerHTML = `
      <strong>${p.nom}</strong><br>
      ${safe(p.places_disponibles)} / ${safe(p.nb_places)} places
    `;

    el.onclick = ()=>showDetail(p);

    list.appendChild(el);
  });
}

// ── DETAIL ──
function showDetail(p){

  selected = p;

  let html = `
    <h3>${p.nom}</h3>
    <p><b>Places :</b> ${safe(p.places_disponibles)} / ${safe(p.nb_places)}</p>
    <p>${safe(p.adresse)}</p>
  `;

  if(p.bornes?.length){

    html += "<h4>⚡ Bornes</h4>";

    p.bornes.forEach((b,i)=>{
      html += `
        <div class="borne" onclick="showBorne(${i})">
          ⚡ ${safe(b.operateur)} - ${safe(b.puissance_max_kw)} kW
        </div>
      `;
    });

  } else {
    html += "<p>Aucune borne proche</p>";
  }

  document.getElementById("detail").innerHTML = html;

  // ✅ zoom map
  if(p.lat && p.lng){
    map.setView([p.lat,p.lng],15);
  }
}

// ── BORNE ──
function showBorne(i){

  if(!selected?.bornes || !selected.bornes[i]){
    console.warn("Borne introuvable");
    return;
  }

  const b = selected.bornes[i];

  let prises = [];
  if(b.types_prise){
    prises = b.types_prise.split(/[,;]+/)
      .map(t=>t.trim())
      .filter(Boolean);
  }

  const ptxt = prises.length ? prises.join(", ") : "Non renseigné";

  document.getElementById("detail").innerHTML = `
    <h3>${safe(b.nom)}</h3>
    <p><b>Opérateur :</b> ${safe(b.operateur)}</p>
